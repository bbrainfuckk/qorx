name: Daily Community Proof

on:
  workflow_dispatch:
  schedule:
    - cron: "27 4 * * *"

permissions:
  contents: write

concurrency:
  group: daily-community-proof
  cancel-in-progress: false

jobs:
  proof:
    name: Refresh live benchmark proof
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - name: Install Rust stable
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy

      - name: Format check
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Metrics worker test
        run: node --test tests/community_metrics_worker.test.mjs

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build release
        run: cargo build --release --locked

      - name: Refresh live benchmark
        run: |
          absent="$(python - <<'PY'
          import uuid
          print(uuid.uuid4().hex)
          PY
          )"
          python scripts/run-benchmark.py \
            --target . \
            --suite qorx-live \
            --budget-tokens 600 \
            --squeeze-budget-tokens 450 \
            --query "Qorx Community Edition AGPL source line" \
            --query "qorx carriers .qorx .qorxb qorx handle" \
            --query "strict answer unsupported claims" \
            --supported-question "Qorx Community Edition AGPL source line" \
            --unsupported-question "$absent" \
            --agent-objective "prove Qorx Community Edition AGPL source line" \
            --output-json docs/benchmarks/live.json \
            --output-md docs/benchmarks/live.md \
            --compact-public-json \
            --no-build

      - name: Upload live proof
        uses: actions/upload-artifact@v7
        with:
          name: qorx-live-community-proof
          path: |
            docs/benchmarks/live.json
            docs/benchmarks/live.md
          retention-days: 30

      - name: Commit refreshed proof
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- docs/benchmarks/live.json docs/benchmarks/live.md; then
            echo "No live benchmark changes."
            exit 0
          fi
          git config user.name "qorx-proof-bot"
          git config user.email "qorx-proof-bot@users.noreply.github.com"
          git add docs/benchmarks/live.json docs/benchmarks/live.md
          git commit -m "Refresh live community proof"
          git push
