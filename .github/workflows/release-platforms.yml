name: Release Community CLI

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update, for example v1.0.5"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: windows-x64
            binary: qorx.exe
            archive: zip
          - os: ubuntu-latest
            asset: linux-x64
            binary: qorx
            archive: tar.gz
          - os: macos-15-intel
            asset: macos-x64
            binary: qorx
            archive: tar.gz
          - os: macos-latest
            asset: macos-arm64
            binary: qorx
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      ASSET_NAME: qorx-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}-${{ matrix.asset }}
      BINARY_NAME: ${{ matrix.binary }}
      ARCHIVE_KIND: ${{ matrix.archive }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        shell: pwsh
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy

      - name: Verify source
        shell: pwsh
        run: |
          cargo fmt --check
          cargo test
          node --test tests/community_metrics_worker.test.mjs
          cargo clippy -- -D warnings

      - name: Build release binary
        shell: pwsh
        run: cargo build --release --locked

      - name: Enforce release size
        shell: pwsh
        run: |
          $bin = Join-Path "target/release" $env:BINARY_NAME
          ./scripts/check-release-size.ps1 -Binary $bin

      - name: Smoke binary
        shell: pwsh
        run: |
          $bin = Join-Path "target/release" $env:BINARY_NAME
          & $bin --version
          & $bin doctor --json
          & $bin index .
          & $bin strict-answer "language runtime proof"

      - name: Package archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $stage = Join-Path "target" $env:ASSET_NAME
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item (Join-Path "target/release" $env:BINARY_NAME) $stage
          if ($env:ARCHIVE_KIND -eq "zip") {
            Copy-Item -LiteralPath "packaging/windows/Start Qorx CLI.cmd" $stage
          }
          Copy-Item README.md $stage
          Copy-Item LICENSE $stage
          Copy-Item TRADEMARKS.md $stage
          if ($env:ARCHIVE_KIND -eq "zip") {
            Compress-Archive -Path (Join-Path $stage "*") -DestinationPath (Join-Path "dist" "$env:ASSET_NAME.zip") -Force
          } else {
            tar -czf (Join-Path "dist" "$env:ASSET_NAME.tar.gz") -C $stage .
          }

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET_NAME }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download assets
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create or update release
        shell: bash
        run: |
          set -euo pipefail
          notes="$(mktemp)"
          cat > "$notes" <<'EOF'
          Qorx Community Edition CLI assets.

          These archives are unsigned AGPL Community Edition CLI builds from the public source tree.

          Windows users can double-click `Start Qorx CLI.cmd` inside the zip to open a terminal that stays visible. `qorx.exe` is the CLI itself; double-clicking a console exe may flash and close after it finishes printing output.

          Qorx Edge Starter gives new accounts the full Edge/Cloud feature set across Windows, macOS, and Linux with 5,000 included Edge/Cloud requests before subscription. Use Qorx Edge for signed installers, tray, daemon, provider routing, MCP activation, ORCL, and support.
          EOF
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --notes-file "$notes"
          else
            gh release create "$RELEASE_TAG" --target "$GITHUB_SHA" --title "Qorx CE $RELEASE_TAG" --notes-file "$notes"
          fi
          gh release upload "$RELEASE_TAG" dist/* --clobber
