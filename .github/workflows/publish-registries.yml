name: Publish Registries

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  preflight:
    name: Resolve package versions
    runs-on: ubuntu-latest
    outputs:
      cargo_version: ${{ steps.versions.outputs.cargo_version }}
      npm_version: ${{ steps.versions.outputs.npm_version }}
      npm_tag: ${{ steps.versions.outputs.npm_tag }}
      pypi_version: ${{ steps.versions.outputs.pypi_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate package-channel files
        shell: pwsh
        run: ./scripts/check-package-channels.ps1

      - name: Resolve versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          cargo_version="$(python - <<'PY'
          import pathlib, re
          text = pathlib.Path("Cargo.toml").read_text()
          print(re.search(r'(?m)^\s*version\s*=\s*"([^"]+)"', text).group(1))
          PY
          )"
          npm_version="$(node -p "require('./packaging/npm/package.json').version")"
          pypi_version="$(python - <<'PY'
          import pathlib, tomllib
          print(tomllib.loads(pathlib.Path("packaging/pypi/pyproject.toml").read_text())["project"]["version"])
          PY
          )"
          npm_tag="latest"
          if [[ "$npm_version" == *-* ]]; then
            npm_tag="next"
          fi
          {
            echo "cargo_version=$cargo_version"
            echo "npm_version=$npm_version"
            echo "npm_tag=$npm_tag"
            echo "pypi_version=$pypi_version"
          } >> "$GITHUB_OUTPUT"

  crates:
    name: Publish crates.io
    needs: preflight
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      CARGO_VERSION: ${{ needs.preflight.outputs.cargo_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        run: |
          rustup update stable
          rustup default stable

      - name: Publish or skip existing crate
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::notice::CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publish."
            exit 0
          fi
          if curl -fsS "https://crates.io/api/v1/crates/qorx/${CARGO_VERSION}" >/dev/null; then
            echo "qorx ${CARGO_VERSION} already exists on crates.io; skipping."
            exit 0
          fi
          cargo publish

  npm:
    name: Publish npm
    needs: preflight
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_VERSION: ${{ needs.preflight.outputs.npm_version }}
      NPM_TAG: ${{ needs.preflight.outputs.npm_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish or skip existing npm package
        shell: bash
        working-directory: packaging/npm
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::notice::NPM_TOKEN is not configured; skipping npm publish."
            exit 0
          fi
          if ! npm whoami >/dev/null 2>&1; then
            echo "::notice::NPM_TOKEN is not accepted by npm; skipping npm publish."
            exit 0
          fi
          if npm view "qorx@${NPM_VERSION}" version >/dev/null 2>&1; then
            echo "qorx ${NPM_VERSION} already exists on npm; skipping."
            exit 0
          fi
          npm publish --access public --tag "${NPM_TAG}"

  pypi:
    name: Publish PyPI
    needs: preflight
    runs-on: ubuntu-latest
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      PYPI_VERSION: ${{ needs.preflight.outputs.pypi_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build and check package
        working-directory: packaging/pypi
        run: |
          python -m build
          python -m twine check dist/*

      - name: Publish or skip existing PyPI package
        shell: bash
        working-directory: packaging/pypi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PYPI_API_TOKEN:-}" ]; then
            echo "::notice::PYPI_API_TOKEN is not configured; skipping PyPI publish."
            exit 0
          fi
          if python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          version = os.environ["PYPI_VERSION"]
          with urllib.request.urlopen("https://pypi.org/pypi/qorx/json", timeout=30) as response:
              data = json.load(response)
          sys.exit(0 if version in data.get("releases", {}) else 1)
          PY
          then
            echo "qorx ${PYPI_VERSION} already exists on PyPI; skipping."
            exit 0
          fi
          python -m twine upload --non-interactive dist/*

  aur:
    name: Publish Arch/AUR
    needs:
      - preflight
      - crates
    runs-on: ubuntu-latest
    env:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
      CARGO_VERSION: ${{ needs.preflight.outputs.cargo_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Publish or skip existing AUR package
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUR_SSH_PRIVATE_KEY:-}" ]; then
            echo "::notice::AUR_SSH_PRIVATE_KEY is not configured; skipping AUR publish."
            exit 0
          fi

          crate_url="https://crates.io/api/v1/crates/qorx/${CARGO_VERSION}/download"
          crate_file="$(mktemp)"
          if ! curl -fsSL "$crate_url" -o "$crate_file"; then
            echo "::notice::qorx ${CARGO_VERSION} is not available on crates.io yet; skipping AUR publish."
            exit 0
          fi
          crate_sha="$(sha256sum "$crate_file" | awk '{print $1}')"
          aur_pkgver="${CARGO_VERSION//-/_}"

          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/aur
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
            StrictHostKeyChecking yes
          EOF

          git clone ssh://aur@aur.archlinux.org/qorx.git aur-qorx
          cd aur-qorx
          git config user.name "Qorx Release Bot"
          git config user.email "release@qorx.dev"

          cat > PKGBUILD <<EOF
          # Maintainer: Marvin Sarreal Villanueva <marvin@orin.work>
          pkgname=qorx
          pkgver=${aur_pkgver}
          pkgrel=1
          _cratever=${CARGO_VERSION}
          pkgdesc="Qorx Community Edition source CLI for local context-resolution research"
          arch=('x86_64' 'aarch64')
          url="https://github.com/bbrainfuckk/qorx"
          license=('AGPL-3.0-only')
          makedepends=('cargo')
          source=("\${pkgname}-\${_cratever}.tar.gz::https://crates.io/api/v1/crates/\${pkgname}/\${_cratever}/download")
          sha256sums=('${crate_sha}')

          build() {
            cd "\${srcdir}/\${pkgname}-\${_cratever}"
            cargo build --release --locked
          }

          check() {
            cd "\${srcdir}/\${pkgname}-\${_cratever}"
            cargo test --locked
          }

          package() {
            cd "\${srcdir}/\${pkgname}-\${_cratever}"
            install -Dm755 target/release/qorx "\${pkgdir}/usr/bin/qorx"
            install -Dm644 LICENSE "\${pkgdir}/usr/share/licenses/\${pkgname}/LICENSE"
            install -Dm644 README.md "\${pkgdir}/usr/share/doc/\${pkgname}/README.md"
            install -Dm644 docs/COMMANDS.md "\${pkgdir}/usr/share/doc/\${pkgname}/COMMANDS.md"
          }
          EOF

          cat > .SRCINFO <<EOF
          pkgbase = qorx
          	pkgdesc = Qorx Community Edition source CLI for local context-resolution research
          	pkgver = ${aur_pkgver}
          	pkgrel = 1
          	url = https://github.com/bbrainfuckk/qorx
          	arch = x86_64
          	arch = aarch64
          	license = AGPL-3.0-only
          	makedepends = cargo
          	source = qorx-${CARGO_VERSION}.tar.gz::https://crates.io/api/v1/crates/qorx/${CARGO_VERSION}/download
          	sha256sums = ${crate_sha}

          pkgname = qorx
          EOF

          if git diff --quiet -- PKGBUILD .SRCINFO; then
            echo "AUR package already matches ${aur_pkgver}; skipping."
            exit 0
          fi
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${aur_pkgver}"
          git push origin master
