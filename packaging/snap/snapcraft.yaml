name: qorx
base: core24
version: "1.0.4a"
summary: Qorx Community Edition CLI
description: |
  Qorx Community Edition is the AGPL source CLI for the Qorx language,
  bytecode, local indexing, and evidence-command model.

grade: stable
confinement: strict

parts:
  qorx:
    plugin: rust
    source: https://github.com/bbrainfuckk/qorx.git
    source-tag: v1.0.4a

apps:
  qorx:
    command: bin/qorx
    plugs:
      - home
      - removable-media
      - network
